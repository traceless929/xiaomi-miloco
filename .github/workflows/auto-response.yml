# 新 Issue / PR 自动回复：欢迎语 + 引导补齐排查所需信息。
# 草案版，文案可按需调整。仅用 github.token，不依赖 GitHub App。
name: Auto Response

on:
  issues:
    types: [opened]
  pull_request_target: # 仅发欢迎评论，不 checkout/执行 PR 代码
    types: [opened]

permissions:
  issues: write
  pull-requests: write

concurrency:
  group: auto-response-${{ github.event.issue.number || github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  welcome:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@373c709c69115d41ff229c7e5df9f8788daa9553 # v9
        with:
          script: |
            const target = context.payload.issue || context.payload.pull_request;
            const isPR = !!context.payload.pull_request;
            const author = target.user.login;
            const body = isPR
              ? [
                  `👋 感谢提交 PR @${author}！维护者会尽快 review。`,
                  ``,
                  `提交前请确认：`,
                  `- CI 全绿（test / lint / build）`,
                  `- 改动聚焦单一主题，便于审阅`,
                  `- 若改动了依赖（lockfile / pyproject.toml / package.json），需维护者评论 \`/allow-dependencies-change <当前 head SHA>\` 放行（之后再 push 需重新放行）`,
                ].join("\n")
              : [
                  `👋 感谢反馈 @${author}！为便于定位问题，请补充以下信息（如适用）：`,
                  ``,
                  `- **复现步骤**：如何触发`,
                  `- **期望 / 实际行为**`,
                  `- **环境**：Miloco 版本、运行 OS、相关小米设备型号`,
                  `- **日志**：相关报错片段；也可运行 \`miloco-cli debug log-pack\` 打包诊断数据（trace db / jsonl / log → \`$MILOCO_HOME/packs/\`）后附在 issue 里`,
                  ``,
                  `维护者会尽快跟进。`,
                ].join("\n");
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: target.number,
              body,
            });
