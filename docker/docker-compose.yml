# Miloco 容器编排（fork 专属）
# network_mode: host — 与摄像头同 LAN，直连 UDP/P2P（Linux 推荐）
# 用法见 docker/README.md

services:
  miloco:
    build:
      context: ..
      dockerfile: docker/Dockerfile.miloco
    image: miloco-local:latest
    container_name: miloco-server
    network_mode: host
    environment:
      MILOCO_HOME: /data/miloco
      MILOCO_SERVER_HOST: "0.0.0.0"
      MILOCO_SERVER_PORT: "${MILOCO_SERVER_PORT:-1810}"
      MILOCO_AGENT_WEBHOOK_URL: "${MILOCO_AGENT_WEBHOOK_URL:-http://127.0.0.1:18789/miloco/webhook}"
      MILOCO_OMNI_API_KEY: "${MILOCO_OMNI_API_KEY:-}"
      MILOCO_OMNI_BASE_URL: "${MILOCO_OMNI_BASE_URL:-https://api.xiaomimimo.com/v1}"
      MILOCO_OMNI_MODEL: "${MILOCO_OMNI_MODEL:-xiaomi/mimo-v2.5}"
    volumes:
      - ${MILOCO_DATA_DIR:-./data}:/data/miloco
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:${MILOCO_SERVER_PORT:-1810}/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 90s

  miloco-agent:
    build:
      context: ..
      dockerfile: docker/Dockerfile.agent
    image: miloco-agent-local:latest
    container_name: miloco-agent
    network_mode: host
    depends_on:
      miloco:
        condition: service_healthy
    environment:
      MILOCO_HOME: /data/miloco
      MILOCO_AGENT_HOST: "0.0.0.0"
      MILOCO_AGENT_PORT: "${MILOCO_AGENT_PORT:-18789}"
    volumes:
      - ${MILOCO_DATA_DIR:-./data}:/data/miloco
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:${MILOCO_AGENT_PORT:-18789}/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

# host 模式下 ports 映射无效；服务直接监听宿主机 1810 / 18789
